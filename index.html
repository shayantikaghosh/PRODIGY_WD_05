<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Real-Time Weather</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>SkyCast</h1>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name..." spellcheck="false">
                <button id="search-btn">Search</button>
            </div>
            <button id="location-btn">Use Current Location</button>
        </header>

        <main id="weather-display" class="hidden">
            <div class="main-info">
                <h2 id="city-name">London, UK</h2>
                <img id="weather-icon" src="" alt="Weather Icon">
                <h3 id="temp">20°C</h3>
                <p id="description">Partly Cloudy</p>
            </div>

            <div class="details-grid">
                <div class="detail-card">
                    <span>Humidity</span>
                    <strong id="humidity">--%</strong>
                </div>
                <div class="detail-card">
                    <span>Wind Speed</span>
                    <strong id="wind">-- km/h</strong>
                </div>
                <div class="detail-card">
                    <span>Feels Like</span>
                    <strong id="feels-like">--°C</strong>
                </div>
                <div class="detail-card">
                    <span>Pressure</span>
                    <strong id="pressure">-- hPa</strong>
                </div>
            </div>
        </main>

        <div id="error-message" class="error hidden">City not found. Please try again.</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
